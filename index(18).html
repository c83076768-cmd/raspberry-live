<style>
  :root {
    /* 浅紫丁香主题色 */
    --bg: #f9f5ff; --card: #f7f6fc; --border: #cdc0e4; --accent: #a68ec8;
    --cream: #f8f4fa; --text: #4d475a; --muted: #948ca0; --light: #f2ecf8;
    --tan: #c8b4de; --shadow: #ece2f4;
    --weather: #a0b4e0; --place: #a4c49e; --time: #d4a03c; --mood: #c88498; --custom: #a894c6;
  }
  /* 青柠色系 (lime) */
  html[data-theme="lime"] {
    --bg: #f4f7f2; --card: #fafdf8; --border: #c0d4ac; --accent: #8ea86a;
    --cream: #f2f7ee; --text: #4d5540; --muted: #8c9a78; --light: #ecf2e6;
    --tan: #b0cc98; --shadow: #dde8d6;
    --weather: #8fb8d4; --place: #90b868; --time: #d4a03c; --mood: #c76b8a; --custom: #90aa72;
  }
  html[data-theme="lime"] .cover {
    background: linear-gradient(135deg, var(--light), rgba(142,168,106,0.08) 50%, var(--light));
  }
  /* 橙子色系 (orange) */
  html[data-theme="orange"] {
    --bg: #faf6f2; --card: #fefcf9; --border: #e0c4a8; --accent: #e8985e;
    --cream: #faf2e8; --text: #5c4a3a; --muted: #a08870; --light: #f6ece0;
    --tan: #d8b890; --shadow: #f0e4d6;
    --weather: #8bb0c8; --place: #b89860; --time: #d4a03c; --mood: #c76b8a; --custom: #c89870;
  }
  html[data-theme="orange"] .cover {
    background: linear-gradient(135deg, var(--light), rgba(232,152,94,0.08) 50%, var(--light));
  }
  /* 海水色系 (ocean) */
  html[data-theme="ocean"] {
    --bg: #f2f5f8; --card: #f8fbfd; --border: #a8c8d8; --accent: #5b9aa0;
    --cream: #eef4f8; --text: #3d5058; --muted: #7898a0; --light: #e4eef4;
    --tan: #90c0cc; --shadow: #d8e8f0;
    --weather: #7aa8c0; --place: #78a898; --time: #c8a04a; --mood: #c76b8a; --custom: #6c9aac;
  }
  html[data-theme="ocean"] .cover {
    background: linear-gradient(135deg, var(--light), rgba(91,154,160,0.08) 50%, var(--light));
  }
  /* 枫叶色系 (maple) */
  html[data-theme="maple"] {
    --bg: #f8f4f2; --card: #fdfaf8; --border: #d8b8a8; --accent: #c1785e;
    --cream: #f8f0e8; --text: #5a4238; --muted: #a0806c; --light: #f2e8e0;
    --tan: #cc9a84; --shadow: #eee0d8;
    --weather: #8aa8b6; --place: #a0905a; --time: #d4a03c; --mood: #c76b8a; --custom: #bc8870;
  }
  html[data-theme="maple"] .cover {
    background: linear-gradient(135deg, var(--light), rgba(193,120,94,0.08) 50%, var(--light));
  }
  /* 荔枝色系 (lychee) — 红壳 + 浊白果肉 */
  html[data-theme="lychee"] {
    --bg: #fdf8f7; --card: #fffdfc; --border: #d89088; --accent: #c8383a;
    --cream: #fdf6f2; --text: #5a3034; --muted: #a06c68; --light: #f9ece8;
    --tan: #d48a7a; --shadow: #f4e2dc;
    --weather: #90a8b8; --place: #b88868; --time: #d4a03c; --mood: #c76b8a; --custom: #c87060;
  }
  html[data-theme="lychee"] .cover {
    background: linear-gradient(135deg, var(--light), rgba(200,83,90,0.07) 50%, var(--light));
  }
  /* 水蜜桃色系 (peach) — 粉绿, pink-dominant */
  html[data-theme="peach"] {
    --bg: #fdf6f8; --card: #fffcfd; --border: #e8c8c8; --accent: #e89898;
    --cream: #fdf2f4; --text: #5c3e40; --muted: #7a8c7a; --light: #f8e6ea;
    --tan: #e0b8b8; --shadow: #f4e0e4;
    --weather: #80a890; --place: #8aac80; --time: #e09860; --mood: #c87490; --custom: #c89890;
  }
  html[data-theme="peach"] .cover {
    background: linear-gradient(135deg, var(--light), rgba(232,152,152,0.07) 50%, rgba(120,168,130,0.04));
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Patrick Hand', cursive; font-size: 15px;
    min-height: 100vh; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle, var(--light) 1px, transparent 1px);
    background-size: 16px 16px; opacity: .4; pointer-events: none; z-index: 0;
  }
  /* 主题装饰 Emoji 容器 */
  #theme-decor { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .decor-emoji {
    position: absolute;
    font-size: var(--s, 28px);
    opacity: var(--o, .1);
    animation: decor-drift var(--d, 12s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    filter: blur(var(--blur, 0.6px));
    user-select: none;
  }
  @keyframes decor-drift {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25%  { transform: translate(var(--dx, 10px), var(--dy, 8px)) rotate(var(--r, 8deg)); }
    50%  { transform: translate(calc(var(--dx, 10px) * 0.3), calc(var(--dy, 8px) * -0.5)) rotate(calc(var(--r, 8deg) * -0.6)); }
    75%  { transform: translate(calc(var(--dx, 10px) * -0.7), calc(var(--dy, 8px) * 0.2)) rotate(calc(var(--r, 8deg) * 0.4)); }
  }
  .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; padding: 28px 16px 12px; border-bottom: 2px dashed var(--shadow); }
  .header h1 { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; text-shadow: 2px 2px 0 var(--light); }
  .gear { position: absolute; top: 16px; right: 16px; cursor: pointer; opacity: .6; transition: opacity .2s; text-align: center; font-size: 8px; color: var(--muted); }
  .gear:hover { opacity: 1; }

  /* Nav */
  .nav { display: flex; justify-content: center; gap: 12px; padding: 20px 16px; flex-wrap: wrap; align-items: center; }
  .btn {
    padding: 10px 20px; border: 2px solid var(--border); background: var(--cream);
    color: #7a7068; cursor: pointer; font-size: 12px; font-family: inherit;
    box-shadow: 2px 2px 0 var(--shadow); transition: all .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.active { background: var(--accent); color: var(--cream); box-shadow: 3px 3px 0 #7a7068; }
  .btn.small { padding: 10px 14px; }

  /* Columns */
  .columns { display: flex; gap: 0; padding: 0 12px 24px; min-height: 60vh; }
  .col { flex: 1; padding: 0 8px; }
  .col-label { text-align: center; font-size: 11px; letter-spacing: 3px; color: var(--muted); padding: 8px 0 12px; }
  .divider { width: 2px; margin: 0 4px; flex-shrink: 0; background: repeating-linear-gradient(to bottom, var(--shadow) 0, var(--shadow) 4px, transparent 4px, transparent 8px); }

  /* Cards */
  .card {
    background: var(--card); border: 2px solid var(--border); margin-bottom: 12px;
    padding: 14px; cursor: pointer; box-shadow: 3px 3px 0 var(--light);
    transition: all .25s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 var(--shadow); }
  .card.expanded { box-shadow: 4px 4px 0 var(--tan); transform: none; }
  .card-empty {
    background: transparent; border: 2px dashed var(--shadow); margin-bottom: 12px;
    padding: 32px 14px; text-align: center; color: #c4b4a0; font-size: 11px;
  }
  .cover {
    width: 100%; aspect-ratio: 1; border: 1px solid var(--light);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--light), rgba(155,126,214,0.08) 50%, var(--light));
  }
  .cover img { width: 100%; height: 100%; object-fit: cover; }
  .vinyl { width: 60%; height: 60%; border-radius: 50%; background: radial-gradient(circle, #7d7087 15%, #6f6a7a 16%, #6f6a7a 30%, #7d7087 31%); opacity: .15; }
  .cover .album-label { position: absolute; bottom: 6px; right: 6px; font-size: 8px; color: var(--muted); background: #faf0e6cc; padding: 2px 4px; }
  .song-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
  .song-artist { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .listen-link { font-size: 9px; color: var(--weather); text-decoration: none; }
  .tag { display: inline-block; padding: 3px 8px; font-size: 10px; margin: 0 4px 4px 0; }

  /* Expanded card content */
  .theme-bar { font-size: 10px; color: var(--muted); margin-top: 10px; padding: 6px 8px; background: var(--bg); }
  .note { font-size: 12px; line-height: 1.6; color: var(--muted); padding: 10px 0; border-top: 1px dashed var(--light); margin-top: 8px; font-style: italic; }
  .comments-section { border-top: 2px dashed var(--light); margin-top: 12px; padding-top: 10px; }
  .comments-label { font-size: 10px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
  .comment-row { display: flex; gap: 8px; margin-bottom: 8px; }
.comment-row.aiai { flex-direction: row; }
   .comment-row.user { flex-direction: row-reverse; }
   .comment-avatar { width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid var(--border); background: var(--cream); }
   .comment-bubble { padding: 8px 10px; font-size: 11px; line-height: 1.5; color: var(--text); max-width: 85%; }
   .comment-bubble.aiai { background: var(--light); border: 2px solid var(--accent); }
  .comment-bubble.user { background: var(--cream); border: 2px solid var(--place); }
  .comment-input { display: flex; gap: 6px; margin-top: 8px; }
  .comment-input input { flex: 1; padding: 8px 10px; border: 2px solid var(--border); background: var(--cream); font-family: inherit; font-size: 11px; color: var(--text); outline: none; }
  .comment-input button { padding: 6px 12px; border: 2px solid var(--border); background: var(--accent); color: var(--cream); cursor: pointer; font-size: 11px; font-family: inherit; box-shadow: 2px 2px 0 #7a7068; }

  /* Filter */
  .filter-bar { padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .filter-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-right: 2px; }
  .filter-cat { position: relative; display: inline-block; }
  .filter-cat-btn { padding: 4px 10px; font-size: 10px; border: 1px solid var(--shadow); background: transparent; color: #8a7a68; cursor: pointer; font-family: inherit; }
  .filter-cat-btn.has-active { border-color: var(--accent); background: var(--light); color: var(--accent); }
  .filter-cat-btn.open { background: var(--accent); color: var(--cream); }
  .filter-dropdown { position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--card); border: 2px solid var(--border); padding: 8px; box-shadow: 4px 4px 0 var(--shadow); z-index: 50; display: flex; flex-wrap: wrap; gap: 4px; min-width: 200px; }
  .filter-tag { padding: 3px 8px; font-size: 10px; cursor: pointer; font-family: inherit; }
  .clear-btn { padding: 4px 8px; font-size: 10px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; font-family: inherit; }

  /* Exchange */
  .exchange { max-width: 600px; margin: 0 auto; padding: 16px; }
  .exchange-card { background: var(--card); border: 2px solid var(--border); padding: 20px; margin-bottom: 16px; box-shadow: 3px 3px 0 var(--shadow); }
  .input { width: 100%; padding: 10px; border: 2px solid var(--border); background: var(--cream); font-family: inherit; font-size: 12px; color: var(--text); outline: none; margin-bottom: 8px; }
  .input:focus { border-color: var(--accent); }
  textarea.input { resize: vertical; min-height: 60px; }
  .submit-btn { padding: 10px 24px; border: 2px solid var(--border); background: var(--accent); color: var(--cream); cursor: pointer; font-size: 12px; font-family: inherit; box-shadow: 3px 3px 0 #7a7068; }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
  .submit-btn:not(:disabled):hover { transform: translateY(-1px); }

  /* History card */
  .hist-card { padding: 12px; background: var(--card); border: 2px solid var(--light); margin-bottom: 8px; cursor: pointer; transition: all .2s; }
  .hist-card:hover { border-color: var(--accent); box-shadow: 3px 3px 0 var(--light); }
  .hist-meta { font-size: 10px; color: var(--muted); margin-bottom: 8px; text-align: center; }
  .hist-theme { font-size: 11px; color: #7a7068; margin-bottom: 10px; font-style: italic; text-align: center; }
  .hist-songs { display: flex; align-items: center; gap: 8px; }
  .hist-side { flex: 1; display: flex; align-items: center; gap: 6px; }
  .hist-side.right { justify-content: flex-end; }

  /* Modals */

function renderThemeDecor(theme) {
  const container = document.getElementById("theme-decor");
  if (!container) return;
  container.innerHTML = "";

  const themes = {
    purple: { emojis: ["💜","🌸","🌺","💐","🌷","🔮","🌙","🪻","🦄","☔","🍇","✨"], count: 15, size:[32,56] },
    lime:   { emojis: ["🍋","🍈","🍃","💚","🌿","🫒","🥝","🍀","🌱","🥒","🥑","🍏","🧃"],  count: 15, size:[28,52] },
    orange: { emojis: ["🍊","🧡","🍑","🥭","🍯","🐱","🦊","🎃","🌻","🍠","🏵️","✨","🍋"],  count: 15, size:[34,60] },
    ocean:  { emojis: ["🌊","💧","🫧","🐚","🦀","🐠","🐟","🐙","🦑","🦈","🐳","🐋","🐡","🦭","🐬","🦞","🐢","🪸"], count: 20, size:[26,48] },
    maple:  { emojis: ["🍁","🍂","🍃","🌰","🍄","🦊","🍎","🥜","🌾","🦉","🐿️","🍷","🏮"], count: 15, size:[32,56] },
    lychee: { emojis: ["🍒","💗","🫧","🌸","🍎","🍷","💐","🍬","🌹","🍓","❤️","🍉","🍷"], count: 15, size:[30,54] },
    peach:  { emojis: ["🍑","🌸","💗","🌸","🍬","🍨","🧴","✨","💫","🎵","🍰","💮","🧁"], count: 15, size:[30,54] }
  };

  const cfg = themes[theme] || themes.purple;
  const cols = Math.ceil(Math.sqrt(cfg.count * 1.6));
  const rows = Math.ceil(cfg.count / cols);
  const cellW = 100 / cols;
  const cellH = 100 / rows;

  for (let i = 0; i < cfg.count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);

    const span = document.createElement("span");
    span.className = "decor-emoji";
    span.textContent = cfg.emojis[Math.floor(Math.random() * cfg.emojis.length)];
    const sz = cfg.size[0] + Math.random() * (cfg.size[1] - cfg.size[0]);
    const op = 0.05 + Math.random() * 0.09;
    const bl = 0.1 + Math.random() * 0.5;

    const padX = cellW * 0.18;
    const padY = cellH * 0.18;
    const left = col * cellW + padX + Math.random() * (cellW - padX * 2);
    const top = row * cellH + padY + Math.random() * (cellH - padY * 2);

    span.style.cssText = `
      --s: ${sz}px;
      --o: ${op};
      --blur: ${bl}px;
      --d: ${7 + Math.random() * 12}s;
      --delay: ${Math.random() * -16}s;
      --dx: ${-25 + Math.random() * 50}px;
      --dy: ${-18 + Math.random() * 36}px;
      --r: ${-35 + Math.random() * 70}deg;
      left: ${left}%;
      top: ${top}%;
      z-index: ${i};
    `;
    container.appendChild(span);
  }
}

    confettiInterval = setTimeout(() => {
      if (!window.__raspberry_effects.ribbons) { confettiInterval = null; return; }
      for(let i=0;i<3;i++) setTimeout(()=> spawnConfetti(), i*120);
      confettiInterval = setInterval(()=>{
        if (!document.hidden) spawnConfetti();
      }, 350);
    }, rand(200, 800));
  }
  function stopConfettiInterval(){ if(confettiInterval){ clearTimeout(confettiInterval); clearInterval(confettiInterval); confettiInterval = null; } }
  function clearConfetti(){ while(confettiContainer.firstChild) confettiContainer.removeChild(confettiContainer.firstChild); }

  function spawnSnowflake(){
    if (!window.__raspberry_effects.snow) return;
    if (snowContainer.childElementCount > snowLimit) return;
    const el = document.createElement('div'); el.className = 'snowflake';
    el.style.left = rand(0,100) + '%';
    el.style.top = '-8vh';
    const size = rand(6,14);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    const dur = rand(6,14);
    el.style.animationDuration = dur + 's';
    el.style.opacity = rand(.6,.95);
    snowContainer.appendChild(el);
    el.addEventListener('animationend', ()=> el.remove());
  }

  function startLeafInterval(){
    if(leafInterval) return;
    leafInterval = setTimeout(() => {
      if (!window.__raspberry_effects.leaves) { leafInterval = null; return; }
      spawnLeaf();
      leafInterval = setInterval(()=>{ if (!document.hidden) spawnLeaf(); }, 850);
    }, rand(400, 2200));
  }
  function stopLeafInterval(){ if(leafInterval){ clearTimeout(leafInterval); clearInterval(leafInterval); leafInterval = null; } }

  function startRain(){
    if(rainInterval) return;
    rainInterval = setInterval(()=>{
      if (document.hidden) return;
      const toSpawn = Math.random() < 0.6 ? Math.floor(rand(2,4)) : Math.floor(rand(1,3));
      for(let i=0;i<toSpawn;i++) spawnRaindrop();
    }, 90);
  }
  function stopRain(){ clearInterval(rainInterval); rainInterval = null; }

  function startSakuraInterval(){
    if(sakuraInterval) return;
    sakuraInterval = setTimeout(() => {
      if (!window.__raspberry_effects.sakura) { sakuraInterval = null; return; }
      spawnSakuraPetal();
      sakuraInterval = setInterval(()=>{ if (!document.hidden) spawnSakuraPetal(); }, 700);
    }, rand(400, 2200));
  }
  function stopSakuraInterval(){ if(sakuraInterval){ clearTimeout(sakuraInterval); clearInterval(sakuraInterval); sakuraInterval = null; } }

  function startBrownLeafInterval(){
    if(brownLeafInterval) return;
    brownLeafInterval = setTimeout(() => {
      if (!window.__raspberry_effects.brownleaves) { brownLeafInterval = null; return; }
      spawnBrownLeaf();
      brownLeafInterval = setInterval(()=>{ if (!document.hidden) spawnBrownLeaf(); }, 900);
    }, rand(400, 2200));
  }
  function stopBrownLeafInterval(){ if(brownLeafInterval){ clearTimeout(brownLeafInterval); clearInterval(brownLeafInterval); brownLeafInterval = null; } }

  function startDandelionInterval(){
    if(dandelionInterval) return;
    dandelionInterval = setTimeout(() => {
      if (!window.__raspberry_effects.dandelion) { dandelionInterval = null; return; }
      spawnDandelion();
      dandelionInterval = setInterval(()=>{ if (!document.hidden) spawnDandelion(); }, 1400);
    }, rand(600, 3000));
  }
  function stopDandelionInterval(){ if(dandelionInterval){ clearTimeout(dandelionInterval); clearInterval(dandelionInterval); dandelionInterval = null; } }
  function clearDandelion(){ while(dandelionContainer.firstChild) dandelionContainer.removeChild(dandelionContainer.firstChild); }

  function startSnowInterval(){
    if(snowInterval) return;
    snowInterval = setTimeout(() => {
      if (!window.__raspberry_effects.snow) { snowInterval = null; return; }
      spawnSnowflake();
      snowInterval = setInterval(()=>{ if (!document.hidden) spawnSnowflake(); }, 220);
    }, rand(400, 2200));
  }
  function stopSnowInterval(){ if(snowInterval){ clearTimeout(snowInterval); clearInterval(snowInterval); snowInterval = null; } }

  function clearLeaves(){ while(leavesContainer.firstChild) leavesContainer.removeChild(leavesContainer.firstChild); }
  function clearRain(){
    while(rainContainer.firstChild) rainContainer.removeChild(rainContainer.firstChild);
    while(splashContainer.firstChild) splashContainer.removeChild(splashContainer.firstChild);
  }
  function clearSakura(){ while(sakuraContainer.firstChild) sakuraContainer.removeChild(sakuraContainer.firstChild); }
  function clearBrownLeaves(){ while(brownLeavesContainer.firstChild) brownLeavesContainer.removeChild(brownLeavesContainer.firstChild); }
  function clearSnow(){ while(snowContainer.firstChild) snowContainer.removeChild(snowContainer.firstChild); }

  function createSnowPiles(){
    if(!snowpilesContainer) return;
    clearSnowPiles();
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 800 85');
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.display = 'block';

    const defs = document.createElementNS(svgNS, 'defs');
    const filter = document.createElementNS(svgNS, 'filter');
    filter.setAttribute('id', 'ps'); filter.setAttribute('x', '-20%'); filter.setAttribute('y', '-20%');
    filter.setAttribute('width', '140%'); filter.setAttribute('height', '140%');
    const feDrop = document.createElementNS(svgNS, 'feDropShadow');
    feDrop.setAttribute('dx', '0'); feDrop.setAttribute('dy', '3');
    feDrop.setAttribute('stdDeviation', '4');
    feDrop.setAttribute('flood-color', '#b8b0a0');
    feDrop.setAttribute('flood-opacity', '0.22');
    filter.appendChild(feDrop);
    defs.appendChild(filter);
    svg.appendChild(defs);

    const l1 = document.createElementNS(svgNS, 'path');
    l1.setAttribute('d', 'M-10,85 C20,64 45,60 80,65 C115,70 140,58 175,62 C210,66 240,56 275,62 C310,66 340,58 375,64 C410,68 440,60 475,64 C510,68 540,58 575,64 C610,68 640,60 675,64 C710,66 740,60 775,64 C800,66 815,64 820,65 L820,85 Z');
    l1.setAttribute('fill', 'rgba(255,253,248,.48)');
    svg.appendChild(l1);

    const l2 = document.createElementNS(svgNS, 'path');
    l2.setAttribute('d', 'M-10,85 C25,68 55,64 95,68 C135,72 165,60 205,66 C245,70 275,60 315,66 C355,70 385,60 425,66 C465,70 495,62 535,66 C575,70 605,62 645,66 C685,70 715,62 755,66 C790,70 810,67 820,67 L820,85 Z');
    l2.setAttribute('fill', 'rgba(255,254,250,.68)');
    l2.setAttribute('filter', 'url(#ps)');
    svg.appendChild(l2);

    [
      'M5,85 C8,68 14,64 25,68 C34,72 42,62 55,68 C64,72 74,76 95,85 Z',
      'M145,85 C155,72 168,66 195,68 C222,66 235,72 245,85 Z',
      'M395,85 C405,74 418,66 432,70 C442,74 452,64 465,70 C478,76 490,68 500,74 C508,78 514,80 520,85 Z',
      'M535,85 C548,76 562,70 580,64 C595,60 608,58 618,68 C624,74 626,66 630,85 Z',
      'M665,85 C672,74 682,66 698,62 C718,60 738,62 758,64 C768,68 774,76 778,85 Z'
    ].forEach(d => {
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', 'rgba(255,254,251,.87)');
      p.setAttribute('filter', 'url(#ps)');
      svg.appendChild(p);
    });

    [
      'M280,85 C285,74 292,70 302,74 C312,78 318,68 328,72 C338,76 344,66 354,72 C360,76 368,80 380,85 Z',
      'M720,85 C724,64 732,60 745,66 C755,70 765,62 778,68 C790,74 800,76 815,85 Z'
    ].forEach(d => {
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', 'rgba(255,255,252,.94)');
      p.setAttribute('filter', 'url(#ps)');
      svg.appendChild(p);
    });

    snowpilesContainer.appendChild(svg);
  }
  function clearSnowPiles(){ while(snowpilesContainer.firstChild) snowpilesContainer.removeChild(snowpilesContainer.firstChild); }

  function createRainbow(){
    if(!rainbowContainer) return;
    clearRainbow();
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 800 400');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.display = 'block';

    const defs = document.createElementNS(svgNS, 'defs');
    const filter = document.createElementNS(svgNS, 'filter');
    filter.setAttribute('id', 'rbg'); filter.setAttribute('x', '-10%'); filter.setAttribute('y', '-10%');
    filter.setAttribute('width', '120%'); filter.setAttribute('height', '120%');
    const feBlur = document.createElementNS(svgNS, 'feGaussianBlur');
    feBlur.setAttribute('stdDeviation', '8');
    filter.appendChild(feBlur);
    defs.appendChild(filter);
    svg.appendChild(defs);

    const bands = [
      { r: 310, color: '#ff6b6b', w: 16, o: 0.32 },
      { r: 292, color: '#ff9f43', w: 16, o: 0.32 },
      { r: 274, color: '#feca57', w: 16, o: 0.32 },
      { r: 256, color: '#54a0ff', w: 16, o: 0.32 },
      { r: 238, color: '#5f27cd', w: 16, o: 0.28 }
    ];

    bands.forEach(b => {
      const arc = document.createElementNS(svgNS, 'path');
      const r = b.r;
      const r2 = r + b.w;
      const d = `M ${400 - r2},220 A ${r2},${r2 * 0.55} 0 0,1 ${400 + r2},220 L ${400 + r},220 A ${r},${r * 0.55} 0 0,0 ${400 - r},220 Z`;
      arc.setAttribute('d', d);
      arc.setAttribute('fill', b.color);
      arc.setAttribute('opacity', b.o);
      arc.setAttribute('filter', 'url(#rbg)');
      svg.appendChild(arc);
    });

    const glowArc = document.createElementNS(svgNS, 'path');
    const gr = 310;
    const gr2 = gr + 90;
    const gd = `M ${400 - gr2},220 A ${gr2},${gr2 * 0.55} 0 0,1 ${400 + gr2},220 L ${400 + gr},220 A ${gr},${gr * 0.55} 0 0,0 ${400 - gr},220 Z`;
    glowArc.setAttribute('d', gd);
    glowArc.setAttribute('fill', '#fffbe6');
    glowArc.setAttribute('opacity', '0.06');
    glowArc.setAttribute('filter', 'url(#rbg)');
    svg.appendChild(glowArc);

    for (let i = 0; i < 18; i++) {
      const sparkle = document.createElementNS(svgNS, 'circle');
      const angle = -30 + Math.random() * 60;
      const rad = (angle * Math.PI) / 180;
      const dist = 180 + Math.random() * 250;
      const cx = 400 + Math.cos(rad) * dist;
      const cy = 220 - Math.sin(rad) * dist * 0.55;
      sparkle.setAttribute('cx', String(cx));
      sparkle.setAttribute('cy', String(cy));
      sparkle.setAttribute('r', String(1 + Math.random() * 2.5));
      sparkle.setAttribute('fill', '#fffbe6');
      sparkle.setAttribute('opacity', String(0.15 + Math.random() * 0.35));
      sparkle.classList.add('rainbow-sparkle');
      sparkle.style.animationDelay = (Math.random() * 3) + 's';
      svg.appendChild(sparkle);
    }

    rainbowContainer.appendChild(svg);
  }
  function clearRainbow(){ while(rainbowContainer.firstChild) rainbowContainer.removeChild(rainbowContainer.firstChild); }

  function createNight(){
    if(!nightContainer) return;
    clearNight();
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 800 500');
    svg.setAttribute('preserveAspectRatio', 'xMaxYMin slice');
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.display = 'block';

    const darkBg = document.createElementNS(svgNS, 'rect');
    darkBg.setAttribute('x', '0'); darkBg.setAttribute('y', '0');
    darkBg.setAttribute('width', '800'); darkBg.setAttribute('height', '500');
    darkBg.setAttribute('fill', '#0a0c1a'); darkBg.setAttribute('opacity', '0.18');
    svg.appendChild(darkBg);

    const defs = document.createElementNS(svgNS, 'defs');
    const moonGlow = document.createElementNS(svgNS, 'filter');
    moonGlow.setAttribute('id', 'mg');
    const mgBlur = document.createElementNS(svgNS, 'feGaussianBlur');
    mgBlur.setAttribute('stdDeviation', '6');
    moonGlow.appendChild(mgBlur);
    defs.appendChild(moonGlow);
    svg.appendChild(defs);

    const moonC = document.createElementNS(svgNS, 'circle');
    moonC.setAttribute('cx', '720'); moonC.setAttribute('cy', '80');
    moonC.setAttribute('r', '38');
    moonC.setAttribute('fill', '#fef9d6'); moonC.setAttribute('opacity', '0.85');
    moonC.setAttribute('filter', 'url(#mg)');
    svg.appendChild(moonC);

    const moonCrater1 = document.createElementNS(svgNS, 'circle');
    moonCrater1.setAttribute('cx', '710'); moonCrater1.setAttribute('cy', '72');
    moonCrater1.setAttribute('r', '7'); moonCrater1.setAttribute('fill', '#e8e0b0'); moonCrater1.setAttribute('opacity', '0.5');
    svg.appendChild(moonCrater1);

    const moonCrater2 = document.createElementNS(svgNS, 'circle');
    moonCrater2.setAttribute('cx', '728'); moonCrater2.setAttribute('cy', '88');
    moonCrater2.setAttribute('r', '5'); moonCrater2.setAttribute('fill', '#e8e0b0'); moonCrater2.setAttribute('opacity', '0.4');
    svg.appendChild(moonCrater2);

    const moonCrater3 = document.createElementNS(svgNS, 'circle');
    moonCrater3.setAttribute('cx', '732'); moonCrater3.setAttribute('cy', '68');
    moonCrater3.setAttribute('r', '3.5'); moonCrater3.setAttribute('fill', '#e8e0b0'); moonCrater3.setAttribute('opacity', '0.45');
    svg.appendChild(moonCrater3);

    for (let i = 0; i < 50; i++) {
      const star = document.createElementNS(svgNS, 'circle');
      const sx = Math.random() * 800;
      const sy = Math.random() * 350;
      const sr = 0.5 + Math.random() * 1.8;
      star.setAttribute('cx', String(sx));
      star.setAttribute('cy', String(sy));
      star.setAttribute('r', String(sr));
      star.setAttribute('fill', '#fffde8');
      star.setAttribute('opacity', String(0.2 + Math.random() * 0.6));
      star.classList.add('night-star');
      star.style.animationDelay = (Math.random() * 4) + 's';
      star.style.animationDuration = (1.5 + Math.random() * 3) + 's';
      svg.appendChild(star);
    }

    nightContainer.appendChild(svg);
  }
  function clearNight(){ while(nightContainer.firstChild) nightContainer.removeChild(nightContainer.firstChild); }

  window.__raspberry_setLeaves = function(on){
    window.__raspberry_effects.leaves = on;
    if(on){ clearLeaves(); startLeafInterval(); }
    else { stopLeafInterval(); clearLeaves(); }
  };
  window.__raspberry_setRain = function(on){
    window.__raspberry_effects.rain = on;
    if(on){ clearRain(); startRain(); }
    else { stopRain(); clearRain(); }
  };
  window.__raspberry_setSakura = function(on){
    window.__raspberry_effects.sakura = on;
    if(on){ clearSakura(); startSakuraInterval(); }
    else { stopSakuraInterval(); clearSakura(); }
  };
  window.__raspberry_setBrownLeaves = function(on){
    window.__raspberry_effects.brownleaves = on;
    if(on){ clearBrownLeaves(); startBrownLeafInterval(); }
    else { stopBrownLeafInterval(); clearBrownLeaves(); }
  };
  window.__raspberry_setDandelion = function(on){
    window.__raspberry_effects.dandelion = on;
    if(on){ clearDandelion(); startDandelionInterval(); }
    else { stopDandelionInterval(); clearDandelion(); }
  };
  window.__raspberry_setRibbons = function(on){
    window.__raspberry_effects.ribbons = on;
    if(on){ clearConfetti(); startConfettiInterval(); }
    else { stopConfettiInterval(); clearConfetti(); }
  };
  window.__raspberry_setSnow = function(on){
    window.__raspberry_effects.snow = on;
    if(on){ clearSnow(); startSnowInterval(); createSnowPiles(); }
    else { stopSnowInterval(); clearSnow(); clearSnowPiles(); }
  };
  window.__raspberry_setRainbow = function(on){
    window.__raspberry_effects.rainbow = on;
    if(on){ createRainbow(); }
    else { clearRainbow(); }
  };
  window.__raspberry_setNight = function(on){
    window.__raspberry_effects.night = on;
    if(on){ document.documentElement.setAttribute('data-night', 'true'); createNight(); }
    else { document.documentElement.removeAttribute('data-night'); clearNight(); }
  };

  startLeafInterval();
  startRain();

  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden){
      stopLeafInterval(); stopRain();
      stopSakuraInterval(); stopBrownLeafInterval(); stopDandelionInterval(); stopConfettiInterval(); stopSnowInterval(); clearRainbow(); clearNight();
    } else {
      if(window.__raspberry_effects.leaves) startLeafInterval();
      if(window.__raspberry_effects.rain) startRain();
      if(window.__raspberry_effects.sakura) startSakuraInterval();
      if(window.__raspberry_effects.brownleaves) startBrownLeafInterval();
      if(window.__raspberry_effects.dandelion) startDandelionInterval();
      if(window.__raspberry_effects.ribbons) startConfettiInterval();
      if(window.__raspberry_effects.snow) { startSnowInterval(); createSnowPiles(); }
      if(window.__raspberry_effects.rainbow) createRainbow();
      if(window.__raspberry_effects.night) createNight();
    }
  });

  setInterval(()=>{
    while(leavesContainer.childElementCount > leafLimit) leavesContainer.removeChild(leavesContainer.firstChild);
    while(rainContainer.childElementCount > raindropLimit) rainContainer.removeChild(rainContainer.firstChild);
    while(sakuraContainer.childElementCount > sakuraLimit) sakuraContainer.removeChild(sakuraContainer.firstChild);
    while(brownLeavesContainer.childElementCount > brownLeafLimit) brownLeavesContainer.removeChild(brownLeavesContainer.firstChild);
    while(dandelionContainer.childElementCount > dandelionLimit) dandelionContainer.removeChild(dandelionContainer.firstChild);
    while(confettiContainer.childElementCount > confettiLimit) confettiContainer.removeChild(confettiContainer.firstChild);
    while(snowContainer.childElementCount > snowLimit) snowContainer.removeChild(snowContainer.firstChild);
  }, 5000);
})();
</script>
</body></html>
